name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          test -f LICENSE
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          echo "All required files present"
